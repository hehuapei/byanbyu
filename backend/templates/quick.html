<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>{{ site_title }}</title>
<meta name="theme-color" content="#ff4d4f">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/favicon-192.png">
<link rel="apple-touch-icon" href="/static/icons/favicon-192.png">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="stylesheet" href="/static/css/attachments.css">
<style>
:root{
  --bg:rgb(255,255,255);
  --panel:rgb(250,250,250);
  --panel-strong:rgb(255,255,255);
  --text:rgba(54,54,54,1);
  --muted:rgba(54,54,54,.58);
  --line:rgba(128,128,128,.18);
  --accent:rgba(255,0,0,.72);
  --accent-strong:rgba(255,77,79,1);
  --success-bg:rgba(20,184,76,.12);
  --success-text:rgb(22,101,52);
  --error-bg:rgba(239,68,68,.12);
  --error-text:rgb(185,28,28);
  --shadow:0 20px 48px rgba(15,23,42,.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:rgb(8,8,8);
    --panel:rgb(22,22,22);
    --panel-strong:rgb(30,30,30);
    --text:rgba(255,255,255,.92);
    --muted:rgba(255,255,255,.58);
    --line:rgba(255,255,255,.08);
    --accent:rgba(255,102,102,.92);
    --accent-strong:rgba(255,120,120,1);
    --success-bg:rgba(34,197,94,.18);
    --success-text:rgb(134,239,172);
    --error-bg:rgba(248,113,113,.18);
    --error-text:rgb(254,202,202);
    --shadow:none;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:17px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:
  radial-gradient(circle at top, rgba(255,77,79,.08), transparent 34%),
  var(--bg)}
button,input,textarea{font:inherit}
button{border:none;background:none}
.page{min-height:100dvh;padding:calc(18px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));display:flex;justify-content:center}
.shell{width:min(100%,560px);min-height:calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 36px);display:flex;flex-direction:column;gap:16px}
.hero{padding-top:4px}
.hero-title{font-size:1.65rem;line-height:1.1;font-weight:700;letter-spacing:-.02em}
.hero-subtitle{margin-top:8px;font-size:.96rem;line-height:1.55;color:var(--muted)}
.composer{flex:1;display:flex;flex-direction:column;padding:16px;border:1px solid var(--line);border-radius:24px;background:color-mix(in srgb, var(--panel) 92%, transparent);box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.composer-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.composer-label{font-size:.9rem;font-weight:600}
.draft-status{font-size:.8rem;line-height:1.3;color:var(--muted);text-align:right;min-height:1.05rem}
.textarea-wrap{flex:1;display:flex}
textarea{width:100%;min-height:280px;flex:1;padding:4px 2px 16px;border:none;outline:none;resize:none;background:transparent;color:var(--text);font-size:1rem;line-height:1.75;caret-color:var(--accent-strong)}
textarea::placeholder{color:var(--muted)}
.helper{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:10px;font-size:.82rem;line-height:1.4;color:var(--muted)}
.helper-tip{max-width:70%}
.helper-meta{white-space:nowrap}
.action-bar{position:sticky;bottom:0;padding:10px;border:1px solid var(--line);border-radius:22px;background:color-mix(in srgb, var(--panel-strong) 88%, transparent);box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.submit-btn{width:100%;min-height:52px;padding:14px 18px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;font-size:1rem;font-weight:600;letter-spacing:.01em;cursor:pointer;transition:transform .18s ease,opacity .18s ease,filter .18s ease,box-shadow .18s ease;box-shadow:0 12px 28px rgba(255,77,79,.24)}
.submit-btn:disabled{cursor:not-allowed;opacity:.58;filter:saturate(.82);box-shadow:none}
.submit-btn:not(:disabled):active{transform:scale(.985)}
.toast{position:fixed;left:50%;top:calc(12px + env(safe-area-inset-top));transform:translate(-50%,-10px);width:min(calc(100% - 28px),420px);padding:12px 14px;border-radius:16px;font-size:.92rem;line-height:1.45;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:20;border:1px solid transparent;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.success{background:var(--success-bg);color:var(--success-text);border-color:color-mix(in srgb, var(--success-text) 20%, transparent)}
.toast.error{background:var(--error-bg);color:var(--error-text);border-color:color-mix(in srgb, var(--error-text) 20%, transparent)}
@media (min-width: 641px){
  .page{padding-left:20px;padding-right:20px;padding-bottom:20px}
  .shell{min-height:min(820px,calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 40px));gap:18px}
  .composer{padding:20px 20px 16px}
  textarea{min-height:360px;padding-bottom:20px}
}
@media (max-width: 640px){
  .page{padding-left:8px;padding-right:8px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
  .shell{gap:12px;min-height:calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px)}
  .hero{padding-inline:4px}
  .hero-title{font-size:1.34rem}
  .hero-subtitle{margin-top:6px;font-size:.88rem;line-height:1.48}
  .composer{flex:none;border-radius:20px;padding:12px 12px 10px}
  .composer-top{align-items:flex-start;flex-direction:column;gap:4px;margin-bottom:10px}
  .composer-label{font-size:.88rem}
  .draft-status{text-align:left;font-size:.78rem}
  .textarea-wrap{flex:none}
  textarea{min-height:148px;max-height:min(38dvh,260px);padding-bottom:10px;line-height:1.65}
  .helper{margin-top:8px;flex-direction:column;align-items:flex-start;gap:4px;font-size:.8rem}
  .helper-tip{max-width:none}
  .action-bar{position:static;padding:0;border:none;border-radius:0;background:transparent;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  .submit-btn{min-height:50px;border-radius:15px}
}
</style>
</head>
<body>
<div id="msg" class="toast" role="status" aria-live="polite"></div>
<main class="page">
  <section class="shell">
    <header class="hero">
      <h1 class="hero-title">快速发布</h1>
      <p class="hero-subtitle">想到什么就记下来，发完还能继续写下一条。</p>
    </header>

    <section class="composer" aria-label="快速发帖">
      <div class="composer-top">
        <div class="composer-label">这一刻想说什么？</div>
        <div id="draftStatus" class="draft-status">未保存草稿</div>
      </div>
      <div class="textarea-wrap">
        <textarea id="postText" placeholder="写点什么……" enterkeyhint="enter" spellcheck="false"></textarea>
      </div>
      <div id="attachTiles" class="bb-att-preview-row" hidden></div>
      <div class="bb-att-toolbar">
        <button type="button" class="bb-att-button" id="addAttachBtn">图片 / 视频</button>
        <input type="file" id="attachInput" multiple accept="image/*,video/quicktime,video/mp4,.mov,.heic,.heif" hidden>
      </div>
      <div class="helper">
        <div class="helper-tip">支持换行分段，桌面端可用 Ctrl / Cmd + Enter 发送。</div>
        <div id="helperMeta" class="helper-meta">准备发送</div>
      </div>
    </section>

    <div class="action-bar">
      <button id="submitBtn" class="submit-btn" type="button" onclick="submitPost()" disabled>发送</button>
    </div>
  </section>
</main>

<script src="/static/js/compose-attachments.js"></script>
<script>
var msgEl = document.getElementById('msg');
var postTextEl = document.getElementById('postText');
var submitBtn = document.getElementById('submitBtn');
var draftStatusEl = document.getElementById('draftStatus');
var helperMetaEl = document.getElementById('helperMeta');
var attachTilesEl = document.getElementById('attachTiles');
var attachInput = document.getElementById('attachInput');
var addAttachBtn = document.getElementById('addAttachBtn');
var draftKey = 'quick-post-draft';
var toastTimer = null;
var draftTimer = null;
var isSubmitting = false;
var hasSavedDraft = false;
var mobileTextareaMinHeight = 148;

function showMsg(text, type) {
  clearTimeout(toastTimer);
  msgEl.className = 'toast ' + type + ' show';
  msgEl.textContent = text;
  toastTimer = setTimeout(function() {
    msgEl.className = 'toast';
  }, 2400);
}

var compose = window.bbCompose.create({
  fileInput: attachInput,
  tilesEl: attachTilesEl,
  showError: function (m) { showMsg(m, 'error'); },
  onChange: function () {
    attachTilesEl.hidden = compose.count() === 0;
    updateSubmitState();
  },
});

addAttachBtn.addEventListener('click', function (e) {
  e.preventDefault();
  attachInput.click();
});

function isMobileLayout() {
  return window.matchMedia('(max-width: 640px)').matches;
}

function syncTextareaHeight() {
  if (!isMobileLayout()) {
    postTextEl.style.height = '';
    return;
  }
  postTextEl.style.height = 'auto';
  postTextEl.style.height = Math.max(postTextEl.scrollHeight, mobileTextareaMinHeight) + 'px';
}

function setDraftStatus(text) {
  draftStatusEl.textContent = text;
}

function updateSubmitState() {
  var hasText = !!postTextEl.value.trim();
  var hasAttachments = compose.hasItems();
  submitBtn.disabled = (!hasText && !hasAttachments) || isSubmitting;
  submitBtn.textContent = isSubmitting ? '发送中…' : '发送';
  helperMetaEl.textContent = (hasText || hasAttachments) ? '可直接发送' : '准备发送';
}

function saveDraftNow() {
  var text = postTextEl.value;
  clearTimeout(draftTimer);
  syncTextareaHeight();
  if (!text.trim()) {
    localStorage.removeItem(draftKey);
    hasSavedDraft = false;
    setDraftStatus('未保存草稿');
    updateSubmitState();
    return;
  }
  localStorage.setItem(draftKey, text);
  hasSavedDraft = true;
  setDraftStatus('草稿已保存');
  updateSubmitState();
}

function scheduleDraftSave() {
  syncTextareaHeight();
  updateSubmitState();
  setDraftStatus(postTextEl.value.trim() ? '正在保存草稿…' : '未保存草稿');
  clearTimeout(draftTimer);
  draftTimer = setTimeout(saveDraftNow, 220);
}

function restoreDraft() {
  var saved = localStorage.getItem(draftKey);
  if (!saved) {
    syncTextareaHeight();
    updateSubmitState();
    return;
  }
  postTextEl.value = saved;
  hasSavedDraft = true;
  setDraftStatus('已恢复草稿');
  syncTextareaHeight();
  updateSubmitState();
}

function clearDraft() {
  clearTimeout(draftTimer);
  localStorage.removeItem(draftKey);
  hasSavedDraft = false;
  syncTextareaHeight();
  setDraftStatus('未保存草稿');
}

function handleResponse(r) {
  if (r.status === 401) {
    saveDraftNow();
    window.location.href = '/admin/login?next=/quick';
    return null;
  }
  if (r.status === 413) {
    return { success: false, error: '上传文件过大（服务端整体上限 500MB）' };
  }
  return r.text().then(function (t) {
    try { return JSON.parse(t); }
    catch (_) { return { success: false, error: '服务异常 (HTTP ' + r.status + ')' }; }
  });
}

function submitPost() {
  var text = postTextEl.value.trim();
  var hasAttachments = compose.hasItems();
  if ((!text && !hasAttachments) || isSubmitting) return;
  isSubmitting = true;
  updateSubmitState();

  var fd = compose.buildFormData({ text: text });
  if (!fd) {
    isSubmitting = false;
    updateSubmitState();
    return;
  }

  fetch('/api/post', { method: 'POST', body: fd })
  .then(handleResponse)
  .then(function(res) {
    if (!res) return;
    if (res.success) {
      postTextEl.value = '';
      compose.clear();
      clearDraft();
      updateSubmitState();
      showMsg('发送成功', 'success');
      postTextEl.focus();
    } else {
      showMsg(res.error || '发送失败', 'error');
    }
  })
  .catch(function (err) {
    console.error('submit failed:', err);
    showMsg('上传失败: ' + ((err && err.message) || '网络异常'), 'error');
  })
  .finally(function() {
    isSubmitting = false;
    updateSubmitState();
  });
}

postTextEl.addEventListener('input', scheduleDraftSave);
postTextEl.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    submitPost();
  }
});
window.addEventListener('resize', syncTextareaHeight);
window.addEventListener('beforeunload', function() {
  if (postTextEl.value.trim()) saveDraftNow();
});

restoreDraft();
syncTextareaHeight();
setTimeout(function() {
  postTextEl.focus();
  syncTextareaHeight();
  if (hasSavedDraft) {
    postTextEl.setSelectionRange(postTextEl.value.length, postTextEl.value.length);
  }
}, 80);
</script>
</body>
</html>

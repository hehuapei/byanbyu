<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ site_title }}</title>
<meta name="description" content="{{ site_desc }} —— 没有点赞评论、阅读量以及随之而来的社交压力，全部意义就在于迎合自己。">
<meta name="theme-color" content="#ff4d4f">
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="alternate" type="application/rss+xml" title="b言b语 RSS" href="/rss.xml">
<link rel="canonical" href="/">
<style>
:root {
  --fg: rgba(255, 255, 255, 1);
  --card-bg: rgb(250, 250, 250);
  --card-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
  --text: rgba(54, 54, 54, 1);
  --accent: rgba(255, 0, 0, 0.7);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fg: rgba(0, 0, 0, 1);
    --card-bg: rgba(20, 20, 20, 1);
    --card-shadow: none;
    --text: rgba(255, 255, 255, 0.9);
    --accent: rgba(255, 100, 100, 1);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;color:var(--text);background-color:var(--fg);-webkit-font-smoothing:antialiased}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
a{color:inherit;text-decoration:none}
.main{margin:auto;width:100%;max-width:460px;padding:0 12px}
.feed-header{font-size:2rem;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:4px;display:flex;align-items:center;width:100%}
.feed-header h1{margin:0;font-size:inherit}
.feed-header-left{display:flex;align-items:baseline;flex:1}
.feed-header .count{font-size:12px;line-height:.3rem;margin-left:.25rem;padding:.5rem;font-style:italic}
.rss-icon{color:var(--accent);opacity:.7;transition:opacity .2s;display:flex;align-items:center;padding:4px}
.rss-icon:hover{opacity:1}
.aside{font-size:.95rem;font-weight:200;line-height:1.5rem;opacity:.7;padding-left:6px;border-left:2px solid var(--accent)}
.feed{margin:16px auto 0;display:flex;flex-direction:column;align-items:center}
.bb-card{box-shadow:var(--card-shadow);background:var(--card-bg);color:var(--text);border-radius:4px;margin-top:12px;font-size:1rem;font-weight:300;width:100%}
.bb-card:first-child{margin-top:0}
.bb-card a{display:flex;flex-direction:column;align-items:flex-start;width:100%;padding:1rem}
.bb-card .bb-content{white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;line-height:1.65rem}
.bb-card .bb-content p{margin:.4em 0}
.bb-card .bb-content p:first-child{margin-top:0}
.bb-card .bb-content p:last-child{margin-bottom:0}
.bb-card .bb-content ol,.bb-card .bb-content ul{padding-left:1.5em;margin:.4em 0;white-space:normal}
.bb-card .bb-content ol{list-style:decimal}
.bb-card .bb-content ul{list-style:disc}
.bb-card .bb-content li{margin:.2em 0}
.bb-card .bb-time{margin-top:8px;align-self:flex-end;opacity:.75;font-size:.9rem;font-weight:100}
.loadmore{text-align:center;font-weight:100;font-size:.9rem;padding:24px 0 calc(60px + env(safe-area-inset-bottom))}
.search-header{display:flex;align-items:baseline;gap:8px;padding:8px 0 12px;flex-wrap:wrap}
.search-label{font-size:.9rem;font-weight:200;opacity:.5}
.search-query{font-size:1.1rem;font-weight:400;padding-bottom:2px;border-bottom:2px solid var(--accent)}
.search-count{font-size:.85rem;font-weight:200;opacity:.4;margin-left:auto}
.search-empty{text-align:center;padding:48px 0;font-weight:200;opacity:.5;font-size:.95rem}

</style>
</head>
<body>
<main class="main">
  <header class="feed-header">
    <div class="feed-header-left">
      <h1>{{ site_title }}</h1>
      <span class="count"><span style="padding-right:.25rem">x</span><span id="totalCount">0</span></span>
    </div>
    <a id="rssLink" href="/rss.xml" target="_blank" rel="noopener noreferrer" class="rss-icon" title="RSS 订阅">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
    </a>
  </header>

  <aside class="aside">{{ site_desc }}</aside>



  <div id="searchHeader" class="search-header" style="display:none">
    <span class="search-label">搜索</span>
    <span class="search-query" id="searchQuery"></span>
    <span class="search-count" id="searchCount"></span>
  </div>

  <div class="feed" id="feed"></div>
  <div class="loadmore" id="loadmore"></div>
</main>

<script>
var API_BASE = {{ api_base | tojson }};

// ── State ──────────────────────────────────────────────
var offset = 0;
var loading = false;
var allLoaded = false;
var PAGE_SIZE = 10;

// Read query from URL
var urlParams = new URLSearchParams(window.location.search);
var query = urlParams.get('q') || '';

// ── DOM refs ───────────────────────────────────────────
var feed = document.getElementById('feed');
var loadmore = document.getElementById('loadmore');
var searchHeader = document.getElementById('searchHeader');
var searchQueryEl = document.getElementById('searchQuery');
var searchCountEl = document.getElementById('searchCount');
var totalCountEl = document.getElementById('totalCount');
var rssLink = document.getElementById('rssLink');

// ── Core ───────────────────────────────────────────────
function fetchMore() {
  if (loading || allLoaded) return;
  loading = true;
  loadmore.innerHTML = '<span>加载中…</span>';

  var url = API_BASE + '/api/feed?offset=' + offset + '&count=' + PAGE_SIZE;
  if (query) url += '&q=' + encodeURIComponent(query);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      var items = res.data || [];
      items.forEach(function(item) {
        var section = document.createElement('section');
        section.className = 'bb-card';
        var a = document.createElement('a');
        a.href = '/post/' + item.id;
        a.target = '_blank';
        a.rel = 'noreferrer';
        a.innerHTML = '<div class="bb-content">' + item.htmlContent + '</div>'
                    + '<time class="bb-time">' + item.timeFormatted + '</time>';
        section.appendChild(a);
        feed.appendChild(section);
      });
      offset += items.length;

      if (items.length < PAGE_SIZE) {
        allLoaded = true;
        loadmore.innerHTML = '<span>就这些了</span>';
      } else {
        loadmore.innerHTML = '';
      }

      // search header
      if (query) {
        searchHeader.style.display = 'flex';
        searchQueryEl.textContent = query;
        searchCountEl.textContent = '共 ' + res.total + ' 条';
      }

      totalCountEl.textContent = res.total;
    })
    .catch(function() { loadmore.innerHTML = '<span>加载失败</span>'; })
    .finally(function() { loading = false; checkNeedMore(); });
}

function checkNeedMore() {
  if (allLoaded) return;
  var sh = window.innerHeight;
  var ah = document.documentElement.scrollHeight;
  var st = window.pageYOffset || document.documentElement.scrollTop;
  if (ah <= sh + st + 200) fetchMore();
}

var throttleTimer;
window.addEventListener('scroll', function() {
  if (throttleTimer) return;
  throttleTimer = setTimeout(function() { throttleTimer = null; checkNeedMore(); }, 300);
}, { passive: true });



// ── Boot ───────────────────────────────────────────────
setTimeout(checkNeedMore, 100);
</script>
</body>
</html>

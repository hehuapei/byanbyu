<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ site_title }}</title>
<meta name="description" content="碎碎念">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/favicon-192.png">
<link rel="apple-touch-icon" href="/static/icons/favicon-192.png">
<link rel="stylesheet" href="/static/css/attachments.css">
<style>
:root {
  --fg: rgba(255, 255, 255, 1);
  --card-bg: rgb(250, 250, 250);
  --card-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
  --text: rgba(54, 54, 54, 1);
  --accent: rgba(255, 0, 0, 0.7);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fg: rgba(0, 0, 0, 1);
    --card-bg: rgba(20, 20, 20, 1);
    --card-shadow: none;
    --text: rgba(255, 255, 255, 0.9);
    --accent: rgba(255, 100, 100, 1);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;color:var(--text);background-color:var(--fg);-webkit-font-smoothing:antialiased}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
a{color:inherit;text-decoration:none}
.main{margin:auto;width:100%;max-width:460px;padding:0 12px}
.feed-header{font-size:2rem;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:4px;display:flex;align-items:center;width:100%}
.feed-header h1{margin:0;font-size:inherit}
.feed-header-left{display:flex;align-items:baseline;flex:1}
.rss-icon{color:var(--accent);opacity:.7;display:flex;align-items:center;padding:4px}
.detail{margin-top:12px;font-size:1rem;font-weight:300;display:flex;flex-direction:column}
.detail .bb-content{white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;line-height:1.65rem}
.detail .bb-content p{margin:.4em 0}
.detail .bb-content p:first-child{margin-top:0}
.detail .bb-content p:last-child{margin-bottom:0}
.detail .bb-content ol,.detail .bb-content ul{padding-left:1.5em;margin:.4em 0;white-space:normal}
.detail .bb-content ol{list-style:decimal}
.detail .bb-content ul{list-style:disc}
.detail .bb-content li{margin:.2em 0}
.detail .bb-time{margin-top:8px;align-self:flex-end;opacity:.75;font-size:.9rem;font-weight:100}
.backtohome{padding:24px 0;font-size:1rem;font-weight:200;text-align:center}
.backtohome a{padding-bottom:4px;border-bottom:2px solid var(--accent)}
</style>
</head>
<body>
<main class="main">
  <header class="feed-header">
    <div class="feed-header-left"><h1>{{ site_title }}</h1></div>
    <a href="/rss.xml" target="_blank" rel="noopener noreferrer" class="rss-icon" title="RSS 订阅">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
    </a>
  </header>
  <div class="detail">
    <div class="bb-content">{{ post.htmlContent | safe }}</div>
    <div id="attachmentsRoot"></div>
    <time class="bb-time">{{ post.timeFormatted }}</time>
  </div>
  <div class="backtohome"><a href="/">← 回去</a></div>
</main>
<script src="/static/js/livephoto.js"></script>
<script src="/static/js/render-attachments.js"></script>
<script>
(function () {
  var attachments = {{ post.attachments | tojson }};
  if (attachments && attachments.length) {
    window.bbAttachments.render(document.getElementById('attachmentsRoot'), attachments, { useFullSize: true });
  }
})();
</script>
</body>
</html>

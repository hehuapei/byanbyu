<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 · {{ site_title }}</title>
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/favicon-192.png">
<link rel="apple-touch-icon" href="/static/icons/favicon-192.png">
<style>
:root {
  --fg: rgba(255, 255, 255, 1);
  --text: rgba(54, 54, 54, 1);
  --accent: rgba(255, 0, 0, 0.7);
}
@media (prefers-color-scheme: dark) {
  :root {
    --fg: rgba(0, 0, 0, 1);
    --text: rgba(255, 255, 255, 0.9);
    --accent: rgba(255, 100, 100, 1);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;color:var(--text);background-color:var(--fg);-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.login-box{width:100%;max-width:360px;text-align:center}
h1{font-size:1.3rem;margin-bottom:24px;opacity:.8}
input{width:100%;padding:10px 14px;font-size:1rem;border:1px solid rgba(128,128,128,.3);border-radius:6px;background:var(--fg);color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{opacity:.4}
button{width:100%;margin-top:12px;padding:10px;font-size:1rem;border:none;border-radius:6px;cursor:pointer;background:var(--accent);color:#fff;transition:opacity .2s}
button:hover{opacity:.8}
.error{color:red;font-size:.85rem;margin-top:10px;display:none}
.remember{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:.9rem;opacity:.75}
.remember input{width:auto;padding:0;margin:0}
</style>
</head>
<body>
<div class="login-box">
  <h1>{{ site_title }} · 管理登录</h1>
  <input id="password" type="password" placeholder="输入管理密码" autofocus>
  <label class="remember"><input id="trustDevice" type="checkbox">记住这台设备</label>
  <button id="loginBtn" onclick="login()">登录</button>
  <div id="error" class="error"></div>
</div>
<script>
var nextPath = {{ next_path | tojson }};

function login() {
  var pwd = document.getElementById('password').value.trim();
  if (!pwd) return;
  document.getElementById('loginBtn').disabled = true;
  fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      password: pwd,
      next: nextPath,
      trust_device: document.getElementById('trustDevice').checked
    })
  })
  .then(function(r) {
    return r.json().then(function(res) {
      return { ok: r.ok, data: res };
    });
  })
  .then(function(result) {
    if (result.ok && result.data && result.data.success) {
      window.location.href = result.data.redirect || '/admin';
      return;
    }

    if (result.data && !result.data.success) {
      var err = document.getElementById('error');
      err.textContent = result.data.error || '密码错误';
      err.style.display = 'block';
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  })
  .catch(function() {
    document.getElementById('loginBtn').disabled = false;
  });
}
document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>

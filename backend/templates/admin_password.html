<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>修改密码 · {{ site_title }}</title>
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/favicon-192.png">
<link rel="apple-touch-icon" href="/static/icons/favicon-192.png">
<style>
:root{--fg:rgba(255,255,255,1);--card-bg:rgb(250,250,250);--text:rgba(54,54,54,1);--accent:rgba(255,0,0,0.7)}
@media(prefers-color-scheme:dark){:root{--fg:rgba(0,0,0,1);--card-bg:rgba(20,20,20,1);--text:rgba(255,255,255,0.9);--accent:rgba(255,100,100,1)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;color:var(--text);background-color:var(--fg);-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
.main{margin:auto;width:100%;max-width:620px;padding:0 12px}
h1{font-size:1.5rem;padding-top:calc(24px + env(safe-area-inset-top));padding-bottom:8px}
.nav{display:flex;gap:16px;margin-bottom:16px;font-size:.85rem}
.nav a{color:var(--accent)}
.nav .active{opacity:.4;pointer-events:none}
.section{border:1px solid rgba(128,128,128,.3);border-radius:4px;padding:12px;margin-bottom:16px}
.section label{display:block;font-size:.8rem;font-weight:400;opacity:.5;margin-bottom:4px}
.section input{width:100%;padding:8px;font-size:.9rem;font-family:inherit;border:1px solid rgba(128,128,128,.2);border-radius:4px;background:var(--card-bg);color:var(--text);outline:none}
.section input:focus{border-color:var(--accent)}
.section .btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.section button{padding:6px 16px;border:1px solid var(--accent);border-radius:4px;cursor:pointer;font-size:.85rem;transition:opacity .2s;color:#fff;background:var(--accent)}
.section button:hover{opacity:.8}.section button.sec{background:transparent;color:var(--text);border-color:rgba(128,128,128,.3)}
.msg{padding:6px 12px;margin-bottom:12px;border-radius:4px;font-size:.85rem;display:none}
.msg.success{display:block;background:rgba(0,180,0,.1);color:green}
.msg.error{display:block;background:rgba(180,0,0,.1);color:red}
</style>
</head>
<body>
<main class="main">
  <h1>{{ site_title }} · 修改密码</h1>
  <div class="nav">
    <a href="/admin">管理首页</a>
    <a href="/admin/settings">站点设置</a>
    <span class="active">修改密码</span>
    <a href="/admin/logout">退出</a>
  </div>

  <div id="msg" class="msg"></div>

  <div class="section">
    <label>旧密码</label>
    <input id="oldPwd" type="password" placeholder="输入旧密码" style="margin-bottom:8px">
    <label>新密码</label>
    <input id="newPwd" type="password" placeholder="至少4位">
    <div class="btn-row">
      <button class="sec" onclick="changePassword()">修改密码</button>
    </div>
  </div>
</main>

<script>
var msgEl = document.getElementById('msg');
function showMsg(text, type) {
  msgEl.className = 'msg ' + type;
  msgEl.textContent = text;
  setTimeout(function() { msgEl.style.display = 'none'; }, 3000);
}
function handleResponse(r) {
  if (r.status === 401) { window.location.href = '/admin/login'; return null; }
  return r.json();
}
function changePassword() {
  var oldPwd = document.getElementById('oldPwd').value;
  var newPwd = document.getElementById('newPwd').value.trim();
  if (!oldPwd || !newPwd) { showMsg('请填写完整', 'error'); return; }
  if (newPwd.length < 4) { showMsg('新密码至少4个字符', 'error'); return; }
  fetch('/api/settings/password', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
  })
  .then(handleResponse)
  .then(function(res) {
    if (!res) return;
    if (res.success) {
      showMsg('密码已修改', 'success');
      document.getElementById('oldPwd').value = '';
      document.getElementById('newPwd').value = '';
    } else {
      showMsg(res.error || '修改失败', 'error');
    }
  });
}
</script>
</body>
</html>
